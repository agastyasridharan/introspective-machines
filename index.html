<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introspective Machines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf6f1;
            color: #2c2416;
            font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.55;
        }

        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
        }

        .logo-mark {
            display: inline-block;
            width: 64px;
            height: 64px;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 0.2s;
        }

        .logo-mark svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 0.4rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 0.4s;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 400;
            color: #6b5d4d;
            font-style: italic;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 0.6s;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: #d4c9b8;
            margin: 0 auto 3rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 0.8s;
        }

        .coming-soon {
            font-size: 1.15rem;
            color: #6b5d4d;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.0s;
        }

        .description {
            font-size: 1.1rem;
            color: #7a6c5c;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.2s;
        }

        .research-link {
            display: inline-block;
            font-size: 1.05rem;
            color: #4a6fa5;
            text-decoration: none;
            padding: 0.6rem 1.6rem;
            border: 1px solid #c8d4e4;
            border-radius: 6px;
            background-color: #fffdf9;
            box-shadow: 0 2px 8px rgba(44, 36, 22, 0.05);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.4s;
        }

        .research-link:hover {
            background-color: #f5f0e8;
            border-color: #4a6fa5;
            box-shadow: 0 2px 12px rgba(74, 111, 165, 0.12);
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #a89a8a;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.6s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .tagline {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-mark">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer circle -->
                <circle cx="32" cy="32" r="28" stroke="#2c2416" stroke-width="1.5" fill="none"/>
                <!-- Inner circle (the "eye" / introspection) -->
                <circle cx="32" cy="32" r="12" stroke="#4a7c59" stroke-width="1.5" fill="none"/>
                <!-- Dot at center -->
                <circle cx="32" cy="32" r="3" fill="#2c2416"/>
                <!-- Connecting lines suggesting reflection -->
                <line x1="32" y1="4" x2="32" y2="20" stroke="#2c2416" stroke-width="1" opacity="0.4"/>
                <line x1="32" y1="44" x2="32" y2="60" stroke="#2c2416" stroke-width="1" opacity="0.4"/>
                <line x1="4" y1="32" x2="20" y2="32" stroke="#2c2416" stroke-width="1" opacity="0.4"/>
                <line x1="44" y1="32" x2="60" y2="32" stroke="#2c2416" stroke-width="1" opacity="0.4"/>
            </svg>
        </div>

        <h1>Introspective Machines</h1>
        <p class="tagline">is coming soon.</p>

        <div class="divider"></div>

        <p class="description">
            We are building towards a future in which machines understand themselves &mdash;
            systems that can examine, evaluate, and articulate their own internal processes
            with rigor and honesty.
        </p>

        <a href="https://agastyasridharan.github.io/introspection/" class="research-link">
            View our previous research &rarr;
        </a>

        <div class="footer">
            &copy; 2026 Introspective Machines
        </div>
    </div>
</body>
</html>
